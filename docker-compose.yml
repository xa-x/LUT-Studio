services:
  lut-studio:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - lut-data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
    restart: unless-stopped

volumes:
  lut-data:
